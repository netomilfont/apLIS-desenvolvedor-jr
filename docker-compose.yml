version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: aplis-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aplis_db
      MYSQL_USER: aplis
      MYSQL_PASSWORD: aplis123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  backend-php:
    build: ./backendphp
    container_name: aplis-php
    restart: always
    ports:
      - "8001:80"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_NAME: aplis_db
      DB_USER: aplis
      DB_PASS: aplis123

  backend-node:
    build: ./backendjs
    container_name: aplis-node
    restart: always
    ports:
      - "8002:3000"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_NAME: aplis_db
      DB_USER: aplis
      DB_PASS: aplis123

  frontend:
    build: ./app
    container_name: aplis-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend-php
      - backend-node

volumes:
  mysql_data: